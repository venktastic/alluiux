<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nAI — AI-Powered Construction Operations Prototypes</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0f1117;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
.container{text-align:center;max-width:480px;padding:40px 24px}
.logo{margin-bottom:32px}
.logo svg{width:120px}
h1{font-size:22px;font-weight:700;margin-bottom:8px;letter-spacing:-0.02em}
p{font-size:14px;color:#9ca3af;line-height:1.5;margin-bottom:40px}
.cards{display:flex;flex-direction:column;gap:12px}
a.card{display:flex;align-items:center;gap:16px;padding:20px;background:#1a1d26;border:1px solid #2d3140;border-radius:12px;text-decoration:none;transition:all .15s}
a.card:hover{border-color:#3b82f6;background:#1e2230}
.card-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.card-info{text-align:left;flex:1}
.card-info h2{font-size:16px;font-weight:600;color:#f1f3f5;margin-bottom:3px}
.card-info span{font-size:13px;color:#6b7280}
.card-arrow{color:#4b5563;font-size:18px}
.footer{margin-top:48px;font-size:11px;color:#4b5563}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <svg viewBox="0 0 120 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M8 32L20 8L32 32" stroke="#e07a2f" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M14 32L26 8L38 32" stroke="#3d5a9e" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
      <path d="M11 32L23 8L35 32" stroke="#8b9dc3" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
      <text x="44" y="30" font-family="Inter,sans-serif" font-size="26" font-weight="800"><tspan fill="#e5e7eb">n</tspan><tspan fill="#9ca3af">AI</tspan></text>
    </svg>
  </div>
  <h1>AI-Powered Construction Operations</h1>
  <p>Interactive UI prototypes for enterprise construction workflows. Choose a prototype to explore.</p>
  <div class="cards">
    <a class="card" href="safetyos-mobile-prototype.html">
      <div class="card-icon" style="background:#1e2a4a;color:#3b82f6">&#9743;</div>
      <div class="card-info">
        <h2>Mobile App</h2>
        <span>10 screens &middot; Splash, Auth, Hierarchy, Home, Profile</span>
      </div>
      <span class="card-arrow">&#8250;</span>
    </a>
    <a class="card" href="safetyos-web-prototype.html">
      <div class="card-icon" style="background:#052e1c;color:#059669">&#9638;</div>
      <div class="card-info">
        <h2>Web App</h2>
        <span>5 screens &middot; Auth, Dashboard, Workspace, Profile</span>
      </div>
      <span class="card-arrow">&#8250;</span>
    </a>
  </div>
  <div class="footer">Powered by Navatech Group</div>
</div>
</body>
</html>
